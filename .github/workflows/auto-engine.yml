name: 🚀 GOD-LEVEL AUTONOMOUS SEO SYSTEM (LIVE DATA BASED)

on:
  schedule:
    - cron: "0 */7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ultra-seo-engine
  cancel-in-progress: false
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
      GEMINI_API_KEY4: ${{ secrets.GEMINI_API_KEY4 }}
      GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
      GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
      
      # ✅ SERP ROTATION
      SERP_API_KEY1: ${{ secrets.SERP_API_KEY1 }}
      DETECT_REPO_TOKEN: ${{ secrets.DETECT_REPO_TOKEN }}

    steps:
    # ================= CHECKOUT =================
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth:  0

    # ================= NODE =================
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: npm

    # ================= INSTALL =================
    - name: 📦 Install Dependencies
      run: npm ci --prefer-offline --no-audit

    # ================= CORE ENGINE =================
    # ✅ FIXED
    - name: 🧠 Run Ultra Core Engine (Main System)
      run: node scripts/main-engine.js

    # ================= SEO FILES =================
    - name: 📊 Generate SEO Files
      run: |
        SEO_FILES=(
          "sitemap-engine.js"
         
        )

        for file in "${SEO_FILES[@]}"; do
          if [ -f "scripts/$file" ]; then
            echo "▶ Running $file"
            node "scripts/$file"
          else
            echo "⚠️ Skipping $file"
          fi
        done

    # ================= COMMIT =================
    - name: 💾 Commit & Push Changes
      run: |
        git config --global user.name "seo-bot"
        git config --global user.email "bot@seo.com"

        git add .

        if git diff --cached --quiet; then
          echo "🟢 No changes to commit"
        else
          git commit -m "🚀 auto update"
          git push
        fi
