name: 🚀 GOD-LEVEL AUTONOMOUS SEO SYSTEM

on:
  schedule:
    - cron: "0 */7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: GOD-LEVEL-SYSTEM
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Gemini
      GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
      GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}

      # Groq
      GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
      GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
      # OpenRouter
      OPENAI_OPENROUTER1: ${{ secrets.OPENAI_OPENROUTER1 }}
      OPENAI_OPENROUTER2: ${{ secrets.OPENAI_OPENROUTER2 }}
      # Hugging Face
      HUGGINGFACE_TOKEN1: ${{ secrets.HUGGINGFACE_TOKEN1 }}
      HUGGINGFACE_TOKEN2: ${{ secrets.HUGGINGFACE_TOKEN2 }}
      # Mistral
      MISTRAL_API_KEY1: ${{ secrets.MISTRAL_API_KEY1 }}
      MISTRAL_API_KEY2: ${{ secrets.MISTRAL_API_KEY2 }}
      # Cloudflare
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # GitHub token for repo detection
      ALL_REPO: ${{ secrets.ALL_REPO }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧠 Run GOD-LEVEL SYSTEM
        run: node engine/core.js

      - name: 💾 Commit & push changes
        run: |
          git config --global user.name "seo-bot"
          git config --global user.email "bot@seo.com"
          git add .
          if git diff --cached --quiet; then
            echo "🟢 No changes to commit"
          else
            git commit -m "🚀 auto update [skip ci]"
            git push
          fi