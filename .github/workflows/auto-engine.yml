name: 🚀 Ultra Autonomous SEO Engine

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ultra-seo-engine
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
      GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
      GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
      GEMINI_API_KEY4: ${{ secrets.GEMINI_API_KEY4 }}
      GEMINI_API_KEY5: ${{ secrets.GEMINI_API_KEY5 }}
      GEMINI_API_KEY6: ${{ secrets.GEMINI_API_KEY6 }}
      DETECT_REPO_TOKEN: ${{ secrets.DETECT_REPO_TOKEN }}

    steps:

    # ================= CHECKOUT =================
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # ================= NODE =================
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: npm

    # ================= INSTALL =================
    - name: 📦 Install Dependencies
      run: npm ci

    # ================= CORE ENGINE =================
    - name: 🧠 Run Core Engine (Main System)
      run: node scripts/core-engine.js

    # ================= MULTI REPO =================
    - name: 🌐 Multi Repo Engine
      run: |
        if [ -f scripts/multi-repo-engine.js ]; then
          echo "🚀 Running Multi Repo Engine"
          node scripts/multi-repo-engine.js
        else
          echo "⚠️ Skipped: multi-repo-engine.js not found"
        fi

    # ================= SEO FILES =================
    - name: 📊 Generate SEO Files
      run: |
        SEO_FILES=(
          "generate-sitemap.js"
          "generate-rss.js"
        )

        for file in "${SEO_FILES[@]}"; do
          if [ -f "scripts/$file" ]; then
            echo "▶ Running $file"
            node "scripts/$file"
          else
            echo "⚠️ Skipping $file"
          fi
        done

    # ================= COMMIT =================
    - name: 💾 Commit & Push Changes
      run: |
        git config --global user.name "seo-bot"
        git config --global user.email "bot@seo.com"

        git add .

        if git diff --cached --quiet; then
          echo "🟢 No changes to commit"
        else
          git commit -m "🚀 ultra seo update"
          git push
        fi