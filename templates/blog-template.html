<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{title}}</title>

<meta name="description" content="{{description}}">
<meta name="keywords" content="{{keywords}}">

<meta name="robots" content="index, follow, max-image-preview:large">

<meta name="author" content="StartKnowledge">

<link rel="canonical" href="https://ultrastaticseoengine.startknowledge.in/blog/{{slug}}">

<link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">

<meta property="og:type" content="article">
<meta property="og:title" content="{{title}}">
<meta property="og:description" content="{{description}}">
<meta property="og:image" content="{{image}}">
<meta property="og:url" content="https://ultrastaticseoengine.startknowledge.in/blog/{{slug}}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{title}}">
<meta name="twitter:description" content="{{description}}">
<meta name="twitter:image" content="{{image}}">

<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"BlogPosting",
 "headline":"{{title}}",
 "description":"{{description}}",
 "image":"{{image}}",
 "datePublished":"{{date}}",
 "author":{
 "@type":"Organization",
 "name":"StartKnowledge"
 },
 "publisher":{
 "@type":"Organization",
 "name":"StartKnowledge"
 },
 "mainEntityOfPage":{
 "@type":"WebPage",
 "@id":"https://ultrastaticseoengine.startknowledge.in/blog/{{slug}}"
 }
}
</script>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
line-height:1.7;
}

.blog{
max-width:900px;
margin:auto;
padding:25px;
background:white;
}

img{
max-width:100%;
height:auto;
}

h1,h2,h3{
margin-top:25px;
}

</style>

<body>

<header class="blog">

<h1>{{title}}</h1>

<form action="#" method="get">

<label for="search-input">Search</label>

<input
type="search"
id="search-input"
name="q"
placeholder="Search articles"
autocomplete="on"
>

</form>

</header>

<main class="blog">

<img src="{{image}}" alt="{{title}}" loading="lazy">

{{content}}

</main>

<footer class="blog">

<h3>Website Pages</h3>

<a href="/pages/about.html">About</a>
<a href="/pages/privacy-policy.html">Privacy Policy</a>
<a href="/pages/terms-and-conditions.html">Terms</a>
<a href="/pages/contact.html">Contact</a>
<a href="/pages/faq.html">FAQ</a>
<a href="/pages/disclaimer.html">Disclaimer</a>

</footer>

</body>
</html>
