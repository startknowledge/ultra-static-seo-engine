{{layout}}

<article class="blog-post">

<h1>{{title}}</h1>

<img src="{{image}}" class="blog-image">

<!-- TOP AD -->
<div class="ad">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-format="fluid"
     data-ad-layout-key="-fw+7+28-5k+1k"
     data-ad-client="ca-pub-2162324894765763"
     data-ad-slot="7592527166"></ins>
</div>

<div class="blog-content">
{{content}}
</div>

<!-- BOTTOM AD -->
<div class="ad">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-format="auto"
     data-ad-client="ca-pub-2162324894765763"
     data-ad-slot="7592527166"></ins>
</div>

<section class="internal-links">
<h3>Related Articles</h3>
<ul>
<li><a href="/blog/{{related1}}.html">{{related1}}</a></li>
<li><a href="/blog/{{related2}}.html">{{related2}}</a></li>
<li><a href="/blog/{{related3}}.html">{{related3}}</a></li>
<li><a href="/blog/{{related4}}.html">{{related4}}</a></li>
</ul>
</section>

</article>

<!-- ADS SCRIPT -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2162324894765763"
     crossorigin="anonymous"></script>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
<script src="./scripts/blog.js"></script>
